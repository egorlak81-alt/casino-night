<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Casino Night</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Text&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a1a0f;
            --gold: #c8a84b;
            --text: #e2d5b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
        }

        .header {
            margin-top: 30px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(200, 168, 75, 0.3);
        }

        #balance-display {
            margin-top: 15px;
            font-size: 20px;
            border: 1px solid var(--gold);
            padding: 5px 20px;
            border-radius: 20px;
            background: rgba(200, 168, 75, 0.05);
        }

        #rooms-list {
            width: 90%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .room-btn {
            background: rgba(200, 168, 75, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

            .room-btn:active {
                background: var(--gold);
                color: var(--bg);
                transform: scale(0.98);
            }

            .room-btn small {
                display: block;
                font-family: 'Crimson Text', serif;
                font-size: 14px;
                margin-top: 5px;
                opacity: 0.8;
            }

        .loading-text {
            margin-top: 50px;
            font-style: italic;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="header">CASINO NIGHT</div>
    <div id="balance-display">Баланс: <span id="bjBal">Загрузка...</span></div>

    <div id="rooms-list">
        <p class="loading-text">Ищем свободные столы...</p>
    </div>

    <script>
        // АКТУАЛЬНЫЙ АДРЕС ВАШЕГО СЕРВЕРА
        const SERVER = 'https://casino-night-production.up.railway.app';

        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.ready();

        const user = tg.initDataUnsafe?.user;

        // Загрузка баланса игрока
        async function loadBalance() {
            if (!user) {
                document.getElementById('bjBal').textContent = 'Демо';
                return;
            }
            try {
                const res = await fetch(`${SERVER}/api/user/${user.id}`);
                const data = await res.json();
                document.getElementById('bjBal').textContent = `$${data.balance}`;
            } catch (e) {
                console.error("Ошибка баланса:", e);
                document.getElementById('bjBal').textContent = 'Ошибка';
            }
        }

        // Загрузка списка комнат
        async function loadRooms() {
            const container = document.getElementById('rooms-list');
            try {
                const res = await fetch(`${SERVER}/api/rooms?game=poker`);
                if (!res.ok) throw new Error('Ошибка сервера');

                const rooms = await res.json();
                container.innerHTML = '';

                if (rooms.length === 0) {
                    container.innerHTML = '<p style="text-align:center">Свободных столов пока нет</p>';
                    return;
                }

                rooms.forEach(room => {
                    const btn = document.createElement('button');
                    btn.className = 'room-btn';
                    btn.innerHTML = `${room.name} <small>Минимальная ставка: $${room.min_bet}</small>`;

                    btn.onclick = () => {
                        tg.showConfirm(`Желаете войти за стол ${room.name}?`, (ok) => {
                            if (ok) {
                                // ОТПРАВЛЯЕМ ДАННЫЕ БОТУ
                                tg.sendData(JSON.stringify({
                                    action: 'join_room',
                                    room_id: room.id,
                                    room_name: room.name
                                }));
                                // Закрываем окно WebApp
                                tg.close();
                            }
                        });
                    };
                    container.appendChild(btn);
                });
            } catch (e) {
                container.innerHTML = '<p style="text-align:center; color:#cc2233">Не удалось связаться с казино...</p>';
                console.error("Ошибка загрузки столов:", e);
            }
        }

        // Запуск при открытии
        window.onload = () => {
            loadBalance();
            loadRooms();
        };
    </script>
</body>
</html>
